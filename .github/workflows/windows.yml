name: Windows Build

# Windows build gate. The whole workspace compiles on Windows: the gpui UI
# stack and the sqlx-backed engine crates included. The gpui/guise probes run
# first as distinct steps so a failure in the make-or-break UI dependency is
# obvious at a glance, then the full workspace build gates every crate.
#
# Each step carries `if: always()` so one failure never hides the others.
on:
  workflow_dispatch: {}
  pull_request:
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/windows.yml"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # The make-or-break dependency: does gpui compile on Windows at all?
      # Everything above the UI layer is wasted if this fails.
      - name: Probe gpui
        run: cargo build -p gpui

      # Our component library resolved against gpui-on-Windows.
      - name: Probe guise-ui
        if: always()
        run: cargo build -p guise-ui

      # The whole workspace now builds on Windows — the gpui app and the
      # sqlx-backed engine crates included. This gates every crate.
      - name: Build workspace
        if: always()
        run: cargo build --workspace
